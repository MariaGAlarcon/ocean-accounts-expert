<svg xmlns="http://www.w3.org/2000/svg" width="720" height="920" viewBox="0 0 720 920" font-family="Arial, sans-serif">

  <rect width="720" height="920" fill="#FAFCFE"/>

  <text x="360" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A5276">What happens if reef condition declines in BSU-6?</text>
  <text x="360" y="43" text-anchor="middle" font-size="9.5" fill="#5D6D7E">Lau Central | Coral reef + seagrass | Pop. 5,500</text>

  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#5D6D7E"/>
    </marker>
    <marker id="ab" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#1565C0"/>
    </marker>
  </defs>

  <!-- 10 steps, each 68px tall, starting at y=56, gap of 12px between -->
  <!-- Step 1 -->
  <rect x="80" y="56" width="540" height="56" rx="7" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <circle cx="102" cy="84" r="11" fill="#43A047"/>
  <text x="102" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="white">1</text>
  <text x="125" y="76" font-size="9.5" font-weight="bold" fill="#2E7D32">Reef condition declines</text>
  <text x="125" y="92" font-size="8.5" fill="#333">CI: 0.71 to 0.45</text>
  <text x="500" y="84" font-size="7.5" fill="#7F8C8D" text-anchor="end">Condition account</text>

  <line x1="350" y1="112" x2="350" y2="124" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="80" y="128" width="540" height="56" rx="7" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <circle cx="102" cy="156" r="11" fill="#43A047"/>
  <text x="102" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="white">2</text>
  <text x="125" y="148" font-size="9.5" font-weight="bold" fill="#2E7D32">Fish biomass drops</text>
  <text x="125" y="164" font-size="8.5" fill="#333">Fish CI: 0.75 to 0.50</text>
  <text x="500" y="156" font-size="7.5" fill="#7F8C8D" text-anchor="end">Condition account</text>

  <line x1="350" y1="184" x2="350" y2="196" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="80" y="200" width="540" height="56" rx="7" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5"/>
  <circle cx="102" cy="228" r="11" fill="#EF6C00"/>
  <text x="102" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="white">3</text>
  <text x="125" y="220" font-size="9.5" font-weight="bold" fill="#E65100">Subsistence catch falls</text>
  <text x="125" y="236" font-size="8.5" fill="#333">-120 tonnes (-26%) | E10</text>
  <text x="500" y="228" font-size="7.5" fill="#7F8C8D" text-anchor="end">Supply-use table</text>

  <line x1="350" y1="256" x2="350" y2="268" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="80" y="272" width="540" height="56" rx="7" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <circle cx="102" cy="300" r="11" fill="#7B1FA2"/>
  <text x="102" y="304" text-anchor="middle" font-size="10" font-weight="bold" fill="white">4</text>
  <text x="125" y="292" font-size="9.5" font-weight="bold" fill="#6A1B9A">Gleaning productivity drops</text>
  <text x="125" y="308" font-size="8.5" fill="#333">-4,500 hours (-30%) | E10</text>
  <text x="500" y="300" font-size="7.5" fill="#7F8C8D" text-anchor="end">Social flows (4a)</text>

  <line x1="350" y1="328" x2="350" y2="340" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="80" y="344" width="540" height="56" rx="7" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
  <circle cx="102" cy="372" r="11" fill="#C2185B"/>
  <text x="102" y="376" text-anchor="middle" font-size="10" font-weight="bold" fill="white">5</text>
  <text x="125" y="364" font-size="9.5" font-weight="bold" fill="#AD1457">Fish consumption per capita falls</text>
  <text x="125" y="380" font-size="8.5" fill="#333">78 to 58 kg/yr (-26%) | E5/E6</text>
  <text x="500" y="372" font-size="7.5" fill="#7F8C8D" text-anchor="end">Social stocks (3a)</text>

  <line x1="350" y1="400" x2="350" y2="412" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 6 -->
  <rect x="80" y="416" width="540" height="56" rx="7" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
  <circle cx="102" cy="444" r="11" fill="#C2185B"/>
  <text x="102" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="white">6</text>
  <text x="125" y="436" font-size="9.5" font-weight="bold" fill="#AD1457">Food poverty rate rises</text>
  <text x="125" y="452" font-size="8.5" fill="#333">18% to ~28% | E5/E6</text>
  <text x="500" y="444" font-size="7.5" fill="#7F8C8D" text-anchor="end">Social stocks (3a)</text>

  <line x1="350" y1="472" x2="350" y2="484" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 7 -->
  <rect x="80" y="488" width="540" height="56" rx="7" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
  <circle cx="102" cy="516" r="11" fill="#C2185B"/>
  <text x="102" y="520" text-anchor="middle" font-size="10" font-weight="bold" fill="white">7</text>
  <text x="125" y="508" font-size="9.5" font-weight="bold" fill="#AD1457">HH switch to less preferred foods</text>
  <text x="125" y="524" font-size="8.5" fill="#333">46% of affected households</text>
  <text x="500" y="516" font-size="7.5" fill="#7F8C8D" text-anchor="end">Coping strategy</text>

  <line x1="350" y1="544" x2="350" y2="556" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 8 -->
  <rect x="80" y="560" width="540" height="56" rx="7" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <circle cx="102" cy="588" r="11" fill="#7B1FA2"/>
  <text x="102" y="592" text-anchor="middle" font-size="10" font-weight="bold" fill="white">8</text>
  <text x="125" y="580" font-size="9.5" font-weight="bold" fill="#6A1B9A">Inter-HH sharing increases</text>
  <text x="125" y="596" font-size="8.5" fill="#333">+15% fish sharing | E6</text>
  <text x="500" y="588" font-size="7.5" fill="#7F8C8D" text-anchor="end">Social flows</text>

  <line x1="350" y1="616" x2="350" y2="628" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 9 -->
  <rect x="80" y="632" width="540" height="56" rx="7" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
  <circle cx="102" cy="660" r="11" fill="#C2185B"/>
  <text x="102" y="664" text-anchor="middle" font-size="10" font-weight="bold" fill="white">9</text>
  <text x="125" y="652" font-size="9.5" font-weight="bold" fill="#AD1457">Women's gleaning income falls</text>
  <text x="125" y="668" font-size="8.5" fill="#333">-30% for female gleaners | E5</text>
  <text x="500" y="660" font-size="7.5" fill="#7F8C8D" text-anchor="end">Social stocks (3a)</text>

  <line x1="350" y1="688" x2="350" y2="700" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 10 -->
  <rect x="80" y="704" width="540" height="56" rx="7" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="102" cy="732" r="11" fill="#1565C0"/>
  <text x="102" y="736" text-anchor="middle" font-size="10" font-weight="bold" fill="white">10</text>
  <text x="125" y="724" font-size="9.5" font-weight="bold" fill="#1565C0">Community monitoring increases</text>
  <text x="125" y="740" font-size="8.5" fill="#333">+400 hours response | E8</text>
  <text x="500" y="732" font-size="7.5" fill="#7F8C8D" text-anchor="end">Social flows + Inst. capital (3c)</text>

  <!-- Feedback arrow curving back up to Step 1 -->
  <path d="M 620 718 Q 680 500 680 200 Q 680 68 580 68 L 625 68"
        stroke="#1565C0" stroke-width="2" fill="none"
        stroke-dasharray="7,4" marker-end="url(#ab)"/>
  <text x="694" y="400" font-size="8" font-weight="bold" fill="#1565C0"
        transform="rotate(-90, 694, 400)">FEEDBACK (Chain D)</text>

  <!-- Caption -->
  <text x="360" y="790" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C3E50">Figure 2</text>
  <text x="360" y="808" text-anchor="middle" font-size="9" font-style="italic" fill="#2C3E50">Cascade through accounts: a single reef bleaching event in BSU-6 propagates through</text>
  <text x="360" y="823" text-anchor="middle" font-size="9" font-style="italic" fill="#2C3E50">five connected account tables. Community stewardship (step 10) feeds back to</text>
  <text x="360" y="838" text-anchor="middle" font-size="9" font-style="italic" fill="#2C3E50">ecosystem condition in the next accounting period.</text>

  <!-- Colour key -->
  <rect x="110" y="858" width="10" height="10" rx="2" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
  <text x="125" y="867" font-size="8" fill="#333">Environment</text>
  <rect x="200" y="858" width="10" height="10" rx="2" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1"/>
  <text x="215" y="867" font-size="8" fill="#333">Services</text>
  <rect x="275" y="858" width="10" height="10" rx="2" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="290" y="867" font-size="8" fill="#333">Social activities</text>
  <rect x="385" y="858" width="10" height="10" rx="2" fill="#FCE4EC" stroke="#C2185B" stroke-width="1"/>
  <text x="400" y="867" font-size="8" fill="#333">Social conditions</text>
  <rect x="500" y="858" width="10" height="10" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="515" y="867" font-size="8" fill="#333">Feedback</text>

</svg>
